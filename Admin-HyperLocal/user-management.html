<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedEasy Enterprise Portal | Users Management</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <!-- Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind -->
    <script src="js/tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- JS Modules -->
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/users.js"></script>
</head>

<body class="text-on-background bg-background">
    <!-- TopNavBar Shell -->
    <header id="navbar-container"></header>

    <div class="flex">
        <!-- SideNav Shell -->
        <aside id="sidebar-container"></aside>

        <!-- Main Content Area -->
        <main class="ml-0 md:ml-64 w-full p-6 md:p-10 space-y-6 overflow-x-hidden">
            <!-- Header Section -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h1 class="font-headline-md text-headline-md font-bold text-primary">Users Directory</h1>
                    <p class="text-body-sm text-secondary text-xs">Manage registered customers, view purchasing history, and edit active status</p>
                </div>
            </div>

            <!-- Filters Section -->
            <div
                class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant flex flex-col sm:flex-row gap-4 justify-between items-center">
                <div
                    class="flex items-center bg-surface-container rounded-lg px-3 py-2 w-full sm:w-80 border border-outline-variant/30">
                    <span class="material-symbols-outlined text-outline mr-2 text-sm">search</span>
                    <input id="user-search" class="bg-transparent border-none focus:ring-0 text-xs w-full p-0"
                        placeholder="Search by name, email, phone..." type="text" />
                </div>
                <div class="flex gap-2 w-full sm:w-auto justify-end">
                    <select id="status-filter"
                        class="bg-surface-container-low border border-outline-variant rounded-lg text-xs py-2 px-3 w-40">
                        <option value="All">All Statuses</option>
                        <option value="Active">Active</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant border-t-4 border-t-primary overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container-low text-secondary font-label-sm uppercase tracking-wider text-xs">
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Customer</th>
                                <th class="px-6 py-4">Contact</th>
                                <th class="px-6 py-4">Total Orders</th>
                                <th class="px-6 py-4">Total Spent</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant" id="user-tbody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="pagination" id="pagination-container">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </main>
    </div>

    <!-- User Details Modal -->
    <div id="user-details-modal" class="modal-backdrop">
        <div class="modal-content !max-w-2xl border-t-4 border-t-primary">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-headline-sm text-headline-sm font-bold">User Details: <span id="detail-user-id" class="text-primary"></span></h3>
                <button onclick="UI.closeModal('user-details-modal')" class="text-secondary hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="space-y-6">
                <!-- Profile details -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-surface-container-low p-4 rounded-xl border border-outline-variant/30 text-xs">
                    <div class="space-y-2">
                        <p class="font-semibold text-secondary">Name: <span id="detail-user-name" class="font-bold text-on-surface text-sm ml-1"></span></p>
                        <p class="font-semibold text-secondary">Email: <span id="detail-user-email" class="text-on-surface ml-1"></span></p>
                        <p class="font-semibold text-secondary">Phone: <span id="detail-user-phone" class="text-on-surface ml-1"></span></p>
                    </div>
                    <div class="space-y-2">
                        <p class="font-semibold text-secondary">Address: <span id="detail-user-address" class="text-on-surface ml-1"></span></p>
                        <p class="font-semibold text-secondary">Status: <span id="detail-user-status" class="ml-1"></span></p>
                    </div>
                </div>

                <!-- Purchase Order History -->
                <div class="space-y-3">
                    <h4 class="font-bold text-sm text-secondary uppercase tracking-wider">Purchase & Order History</h4>
                    <div class="overflow-hidden border border-outline-variant rounded-xl max-h-60 overflow-y-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-surface-container-low text-secondary font-label-sm uppercase tracking-wider text-[10px]">
                                    <th class="px-4 py-2">Order ID</th>
                                    <th class="px-4 py-2">Date</th>
                                    <th class="px-4 py-2">Purchased Products</th>
                                    <th class="px-4 py-2 text-right">Total</th>
                                    <th class="px-4 py-2 text-right">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-outline-variant" id="detail-user-orders-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="flex justify-end gap-2 pt-2 border-t border-outline-variant/30">
                    <button type="button" onclick="UI.closeModal('user-details-modal')"
                        class="btn btn-secondary py-2 px-6 text-xs">Close</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
