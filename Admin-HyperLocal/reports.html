<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedEasy Enterprise Portal | Reports & Analytics</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <!-- Icons -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind -->
    <script src="js/tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <link rel="stylesheet" href="css/charts.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- JS Modules -->
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="text-on-background bg-background">
    <!-- TopNavBar Shell -->
    <header id="navbar-container"></header>

    <div class="flex">
        <!-- SideNav Shell -->
        <aside id="sidebar-container"></aside>

        <!-- Main Content Area -->
        <main class="ml-0 md:ml-64 w-full p-6 md:p-10 space-y-6 overflow-x-hidden">
            <!-- Header Section -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h1 class="font-headline-md text-headline-md font-bold text-primary">Reports & Analytics</h1>
                    <p class="text-body-sm text-secondary text-xs">Analyze system performance, order trends, and revenue
                        metrics</p>
                </div>
                <button onclick="UI.showToast('Report exported successfully!', 'success')"
                    class="btn btn-primary text-xs py-2">
                    <span class="material-symbols-outlined text-sm">download</span>
                    Export PDF Report
                </button>
            </div>

            <!-- Charts Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Revenue Trend Chart -->
                <div class="bg-surface-container-lowest p-6 rounded-2xl border border-outline-variant border-t-4 border-t-primary">
                    <h3 class="font-bold text-sm text-secondary mb-4 uppercase tracking-wider">Revenue Trend (Last 7
                        Days)</h3>
                    <div class="h-64 flex items-end gap-1">
                        <svg class="w-full h-full" viewBox="0 0 400 200">
                            <path class="chart-path" d="M0 160 Q 50 180 100 120 T 200 100 T 300 140 T 400 40"
                                fill="none" stroke="#006933" stroke-linecap="round" stroke-width="4"></path>
                            <path d="M0 160 Q 50 180 100 120 T 200 100 T 300 140 T 400 40 L 400 200 L 0 200 Z"
                                fill="url(#revenue-grad)" opacity="0.15"></path>
                            <defs>
                                <linearGradient id="revenue-grad" x1="0%" x2="0%" y1="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#006933;stop-opacity:1"></stop>
                                    <stop offset="100%" style="stop-color:#006933;stop-opacity:0"></stop>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>

                <!-- Order Volume Chart -->
                <div class="bg-surface-container-lowest p-6 rounded-2xl border border-outline-variant border-t-4 border-t-primary">
                    <h3 class="font-bold text-sm text-secondary mb-4 uppercase tracking-wider">Order Volume Trend</h3>
                    <div class="h-64 flex items-end gap-1">
                        <svg class="w-full h-full" viewBox="0 0 400 200">
                            <path class="chart-path" d="M0 120 Q 50 140 100 80 T 200 60 T 300 100 T 400 20" fill="none"
                                stroke="#008542" stroke-linecap="round" stroke-width="4"></path>
                            <path d="M0 120 Q 50 140 100 80 T 200 60 T 300 100 T 400 20 L 400 200 L 0 200 Z"
                                fill="url(#order-grad)" opacity="0.15"></path>
                            <defs>
                                <linearGradient id="order-grad" x1="0%" x2="0%" y1="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#008542;stop-opacity:1"></stop>
                                    <stop offset="100%" style="stop-color:#008542;stop-opacity:0"></stop>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
