<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MedEasy Enterprise Portal | Rider Verification</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <!-- Icons -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind -->
    <script src="js/tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/tables.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- JS Modules -->
    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/riders.js"></script>
</head>

<body class="text-on-background bg-background">
    <!-- TopNavBar Shell -->
    <header id="navbar-container"></header>

    <div class="flex">
        <!-- SideNav Shell -->
        <aside id="sidebar-container"></aside>

        <!-- Main Content Area -->
        <main class="ml-0 md:ml-64 w-full p-6 md:p-10 space-y-6 overflow-x-hidden">
            <!-- Header Section -->
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='rider-management.html'"
                    class="text-secondary hover:text-primary p-1">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div>
                    <h1 class="font-headline-md text-headline-md font-bold text-primary">Rider Verification Queue</h1>
                    <p class="text-body-sm text-secondary text-xs">Review and approve pending rider registrations and
                        documents</p>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr
                                class="bg-surface-container-low text-secondary font-label-sm uppercase tracking-wider text-xs">
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Rider</th>
                                <th class="px-6 py-4">Vehicle</th>
                                <th class="px-6 py-4">Documents</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant" id="verification-tbody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
