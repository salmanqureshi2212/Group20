<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Code Hub & Exporter</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Prism Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
  
  <style>
    :root {
      --bg-main: #0f172a;      /* slate-900 */
      --bg-sidebar: #1e293b;   /* slate-800 */
      --bg-card: #0f172a;
      --bg-editor: #090d16;
      --text-main: #cbd5e1;    /* slate-300 */
      --text-light: #f8fafc;   /* slate-50 */
      --text-muted: #64748b;   /* slate-500 */
      --primary: #10b981;      /* Emerald */
      --primary-hover: #059669;
      --border: #334155;       /* slate-700 */
      --border-light: #475569;  /* slate-600 */
      --accent: #6366f1;       /* Indigo */
      --accent-hover: #4f46e5;
      --danger: #ef4444;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-main);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Top Navigation / Header */
    header {
      background-color: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
    }

    .brand-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-light);
      letter-spacing: -0.025em;
    }

    .brand-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: var(--border-light);
      color: var(--text-light);
      border: 1px solid var(--border-light);
    }

    .btn-secondary:hover {
      background-color: var(--border);
      border-color: var(--border-light);
    }

    .btn-success {
      background-color: var(--accent);
    }

    .btn-success:hover {
      background-color: var(--accent-hover);
    }

    /* Main Layout */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar Styles */
    aside {
      width: 320px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
      transition: var(--transition);
    }

    .search-box {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .search-input {
      width: 100%;
      background-color: var(--bg-main);
      border: 1px solid var(--border-light);
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      color: var(--text-light);
      font-family: var(--font-sans);
      font-size: 0.875rem;
      transition: var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0.5rem;
    }

    /* File List & Groups */
    .file-group {
      margin-bottom: 1.5rem;
    }

    .group-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .group-badge {
      background-color: var(--border-light);
      color: var(--text-main);
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 9999px;
      font-weight: 500;
    }

    .file-list {
      list-style: none;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-main);
      transition: var(--transition);
      margin-bottom: 0.125rem;
    }

    .file-item:hover {
      background-color: rgba(255, 255, 255, 0.03);
      color: var(--text-light);
    }

    .file-item.active {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--text-light);
      border-left: 3px solid var(--primary);
      padding-left: calc(0.75rem - 3px);
    }

    .file-info-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .file-icon {
      font-size: 0.95rem;
      width: 1.2rem;
      display: flex;
      justify-content: center;
    }

    .icon-html { color: #f06529; }
    .icon-css { color: #2965f1; }
    .icon-js { color: #f0db4f; }
    .icon-json { color: #4ade80; }
    .icon-java { color: #f89820; }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .file-meta-size {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-left: 0.5rem;
      flex-shrink: 0;
    }

    /* Main Code View Area */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-main);
      overflow: hidden;
      position: relative;
    }

    /* Welcome / Dashboard View */
    .dashboard-view {
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      overflow-y: auto;
      text-align: center;
    }

    .dashboard-card {
      max-width: 800px;
      width: 100%;
      background-color: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 2.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .dashboard-title {
      font-size: 2.2rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      font-weight: 700;
      background: linear-gradient(to right, var(--text-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dashboard-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-light);
      border-radius: 0.5rem;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .stat-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      background-color: rgba(16, 185, 129, 0.02);
    }

    .stat-icon {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-light);
      font-family: var(--font-mono);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    .lang-chart-container {
      margin-bottom: 2.5rem;
    }

    .chart-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-light);
      text-align: left;
      margin-bottom: 0.75rem;
    }

    .chart-bar-wrapper {
      height: 12px;
      background-color: var(--bg-main);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      margin-bottom: 1rem;
    }

    .chart-segment {
      height: 100%;
      transition: var(--transition);
    }

    .segment-html { background-color: #f06529; }
    .segment-css { background-color: #2965f1; }
    .segment-js { background-color: #f0db4f; }
    .segment-json { background-color: #4ade80; }
    .segment-java { background-color: #f89820; }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .legend-label {
      color: var(--text-main);
    }

    .legend-val {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    .quick-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    /* Code Viewer Layout */
    .editor-view {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .editor-header {
      background-color: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .file-path-display {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .file-path-display i {
      color: var(--text-muted);
    }

    .file-stats-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      background-color: var(--bg-main);
      padding: 0.25rem 0.6rem;
      border-radius: 0.25rem;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
    }

    .editor-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-editor {
      background-color: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 0.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
    }

    .btn-editor:hover {
      background-color: var(--border);
      color: var(--text-light);
      border-color: var(--text-muted);
    }

    .btn-editor.copied {
      background-color: rgba(16, 185, 129, 0.15);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Code Block Area */
    .code-container {
      flex: 1;
      overflow: auto;
      background-color: var(--bg-editor);
      position: relative;
    }

    .code-container pre {
      margin: 0 !important;
      padding: 1.5rem !important;
      background-color: transparent !important;
      height: 100%;
      box-sizing: border-box;
      font-family: var(--font-mono) !important;
      font-size: 0.875rem !important;
      line-height: 1.5 !important;
    }

    .code-container code {
      font-family: var(--font-mono) !important;
      background-color: transparent !important;
      text-shadow: none !important;
    }

    /* Prism Customizations for slate theme integration */
    .token.comment, .token.prolog, .token.doctype, .token.cdata {
      color: #6a737d;
    }
    .token.punctuation {
      color: #999;
    }
    .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol, .token.deleted {
      color: #ff7b72;
    }
    .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin, .token.inserted {
      color: #7ee787;
    }
    .token.operator, .token.entity, .token.url, .language-css .token.string, .style .token.string {
      color: #d1f1a5;
    }
    .token.atrule, .token.attr-value, .token.keyword {
      color: #d2a8ff;
    }
    .token.function, .token.class-name {
      color: #d2a8ff;
    }
    .token.regex, .token.important, .token.variable {
      color: #ffab70;
    }

    /* Zip creation modal/spinner overlay */
    .spinner-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(11, 15, 25, 0.85);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .spinner-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      border: 4px solid rgba(16, 185, 129, 0.1);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .spinner-text {
      color: var(--text-light);
      font-weight: 500;
      font-size: 1.1rem;
    }

    /* Mobile Sidebar Toggle */
    .sidebar-toggle {
      display: none;
      background-color: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-main);
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 0.375rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: var(--transition);
    }

    .sidebar-toggle:hover {
      background-color: var(--border);
      color: var(--text-light);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex;
      }
      
      aside {
        position: absolute;
        left: -320px;
        top: 0;
        bottom: 0;
        z-index: 40;
        box-shadow: 10px 0 25px rgba(0, 0, 0, 0.5);
      }

      aside.open {
        left: 0;
      }

      .backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 35;
      }

      .backdrop.show {
        display: block;
      }

      .dashboard-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Backdrop for mobile sidebar -->
  <div class="backdrop" id="sidebarBackdrop"></div>

  <!-- Header -->
  <header>
    <div class="brand">
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="brand-logo">HP</div>
      <div class="brand-text">
        <h1>Hyperlocal Admin Portal</h1>
        <p>Project Code Hub & Exporter</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="showDashboard()" title="View Statistics & Info">
        <i class="fa-solid fa-chart-simple"></i> Dashboard
      </button>
      <button class="btn btn-success" id="downloadZipBtn" onclick="downloadAllAsZip()" title="Download whole codebase as a single ZIP file">
        <i class="fa-solid fa-file-zipper"></i> Download ZIP
      </button>
    </div>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside id="appSidebar">
      <div class="search-box">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search files by path/name..." oninput="filterFiles()">
        </div>
      </div>
      <div class="sidebar-content" id="sidebarContent">
        <!-- Dynamic sidebar content loaded via JS -->
      </div>
    </aside>

    <!-- Main Content View -->
    <main>
      <!-- Welcome/Dashboard State -->
      <div class="dashboard-view" id="dashboardView">
        <div class="dashboard-card">
          <h2 class="dashboard-title">Hyperlocal Admin Portal</h2>
          <p class="dashboard-subtitle">A comprehensive offline/online code explorer and downloader for the administration module</p>
          
          <div class="stats-grid">
            <div class="stat-card">
              <i class="fa-solid fa-file-code stat-icon"></i>
              <span class="stat-val" id="statFiles">0</span>
              <span class="stat-label">Total Files</span>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-align-left stat-icon"></i>
              <span class="stat-val" id="statLines">0</span>
              <span class="stat-label">Total Lines</span>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-weight-hanging stat-icon"></i>
              <span class="stat-val" id="statSize">0 KB</span>
              <span class="stat-label">Total Size</span>
            </div>
          </div>

          <div class="lang-chart-container">
            <h3 class="chart-title">Code Composition</h3>
            <div class="chart-bar-wrapper" id="chartBarWrapper">
              <!-- Visual bar populated via JS -->
            </div>
            <div class="chart-legend" id="chartLegend">
              <!-- Legend items populated via JS -->
            </div>
          </div>

          <div class="quick-actions">
            <button class="btn btn-secondary" onclick="focusSearch()">
              <i class="fa-solid fa-search"></i> Search Files
            </button>
            <button class="btn" onclick="downloadAllAsZip()">
              <i class="fa-solid fa-file-zipper"></i> Download All as ZIP
            </button>
          </div>
        </div>
      </div>

      <!-- Code Editor/Viewer State -->
      <div class="editor-view" id="editorView">
        <div class="editor-header">
          <div class="file-path-display">
            <i class="fa-solid fa-file-code" id="activeFileIcon"></i>
            <span id="activeFilePath">path/to/file.js</span>
            <div class="file-stats-badge">
              <span id="activeFileSize">0 B</span>
              <span>|</span>
              <span id="activeFileLineCount">0 lines</span>
            </div>
          </div>
          <div class="editor-actions">
            <button class="btn-editor" id="copyCodeBtn" onclick="copyCode()" title="Copy entire code to clipboard">
              <i class="fa-solid fa-copy"></i> <span>Copy Code</span>
            </button>
            <button class="btn-editor" onclick="downloadActiveFile()" title="Download this file individually">
              <i class="fa-solid fa-download"></i> <span>Download File</span>
            </button>
          </div>
        </div>
        <div class="code-container">
          <pre class="line-numbers"><code id="codeBlock" class="language-javascript"></code></pre>
        </div>
      </div>
    </main>
  </div>

  <!-- Loading zip spinner overlay -->
  <div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner"></div>
    <div class="spinner-text" id="spinnerText">Generating ZIP export...</div>
  </div>

  <!-- JSZip and Prism scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    // Helper functions
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getFileIcon(lang) {
      switch (lang) {
        case 'markup': return 'fa-html5 icon-html';
        case 'css': return 'fa-css3-alt icon-css';
        case 'javascript': return 'fa-js icon-js';
        case 'json': return 'fa-braces icon-json';
        case 'java': return 'fa-brands fa-java icon-java';
        default: return 'fa-file-code text-muted';
      }
    }

    // Initialize the application
    document.addEventListener('DOMContentLoaded', () => {

      if (window.location.protocol === 'file:') {

        warningBanner.style.border = '1px solid rgba(239, 68, 68, 0.3)';
        warningBanner.style.color = '#f87171';
        warningBanner.style.padding = '1rem';
        warningBanner.style.borderRadius = '0.5rem';

          </div>

      // 2. Populate stats dashboard
      document.getElementById('statFiles').innerText = PROJECT_STATS.totalFiles;
      document.getElementById('statLines').innerText = PROJECT_STATS.totalLines.toLocaleString();

      document.getElementById('dashboardView').style.display = 'flex';
      
      // De-select sidebar files

      activeFilePath = null;

      document.getElementById('appSidebar').classList.remove('open');

    function focusSearch() {

    function renderCompositionChart() {
      const barWrapper = document.getElementById('chartBarWrapper');
      const legend = document.getElementById('chartLegend');
      
      barWrapper.innerHTML = '';
      legend.innerHTML = '';

      const languages = [
        { name: 'HTML', key: 'html', color: '#f06529', cls: 'segment-html' },
        { name: 'CSS', key: 'css', color: '#2965f1', cls: 'segment-css' },
        { name: 'JS', key: 'js', color: '#f0db4f', cls: 'segment-js' },
        { name: 'JSON', key: 'json', color: '#4ade80', cls: 'segment-json' },
        { name: 'Java', key: 'java', color: '#f89820', cls: 'segment-java' }
      ];

      languages.forEach(lang => {
        const data = PROJECT_STATS[lang.key];
        if (!data || data.count === 0) return;

        const countPercent = (data.count / PROJECT_STATS.totalFiles) * 100;
        
        // Add chart segment
        const segment = document.createElement('div');
        segment.className = `chart-segment ${lang.cls}`;
        segment.style.width = `${countPercent}%`;
        segment.title = `${lang.name}: ${data.count} files (${countPercent.toFixed(1)}%)`;
        barWrapper.appendChild(segment);

        // Add legend item
        const legendItem = document.createElement('div');
        legendItem.className = 'legend-item';
        legendItem.innerHTML = `
          <span class="legend-color" style="background-color: ${lang.color}"></span>
          <span class="legend-label">${lang.name}</span>
          <span class="legend-val">${data.count} files (${formatBytes(data.size)})</span>
        `;
        legend.appendChild(legendItem);
      });
    }

    function renderSidebarList(filterTerm = '') {
      const container = document.getElementById('sidebarContent');
      container.innerHTML = '';

      // Group files
      const groups = {
        'root': { title: 'Root HTML Files', files: [] },
        'css': { title: 'CSS Stylesheets (css/)', files: [] },
        'js': { title: 'JavaScript Logic (js/)', files: [] },
        'data': { title: 'JSON Data (data/)', files: [] },
        'javaSrc': { title: 'Java Source (console-app/src/)', files: [] },
        'javaData': { title: 'Java App Data (console-app/data/)', files: [] }
      };

      Object.keys(PROJECT_FILES).forEach(path => {
        if (filterTerm && !path.toLowerCase().includes(filterTerm.toLowerCase())) {
          return;
        }

        const data = PROJECT_FILES[path];
        if (path.startsWith('css/')) {
          groups.css.files.push({ path, ...data });
        } else if (path.startsWith('js/')) {
          groups.js.files.push({ path, ...data });
        } else if (path.startsWith('data/')) {
          groups.data.files.push({ path, ...data });
        } else if (path.startsWith('console-app/src/')) {
          groups.javaSrc.files.push({ path, ...data });
        } else if (path.startsWith('console-app/data/')) {
          groups.javaData.files.push({ path, ...data });
        } else {
          groups.root.files.push({ path, ...data });
        }
      });

      // Render groups
      Object.keys(groups).forEach(key => {
        const group = groups[key];
        if (group.files.length === 0) return;

        const groupDiv = document.createElement('div');
        groupDiv.className = 'file-group';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'group-title';
        titleDiv.innerHTML = `
          <span>${group.title}</span>
          <span class="group-badge">${group.files.length}</span>
        `;
        groupDiv.appendChild(titleDiv);

        const listUl = document.createElement('ul');
        listUl.className = 'file-list';

        group.files.sort((a, b) => a.path.localeCompare(b.path)).forEach(file => {
          const li = document.createElement('li');
          li.className = 'file-item';
          if (activeFilePath === file.path) {
            li.classList.add('active');
          }
          li.dataset.path = file.path;
          li.onclick = () => selectFile(file.path);

          // Get filename only for listing
          const parts = file.path.split('/');
          const fileName = parts[parts.length - 1];

          li.innerHTML = `
            <div class="file-info-left">
              <i class="fa-brands ${getFileIcon(file.lang)} file-icon"></i>
              <span class="file-name" title="${file.path}">${fileName}</span>
            </div>
            <span class="file-meta-size">${formatBytes(file.size)}</span>
          `;
          listUl.appendChild(li);
        });

        groupDiv.appendChild(listUl);
        container.appendChild(groupDiv);
      });
    }

    function filterFiles() {
      const term = document.getElementById('searchInput').value;
      renderSidebarList(term);
    }

    async function selectFile(filePath) {
      activeFilePath = filePath;
      const fileMeta = PROJECT_FILES[filePath];
      if (!fileMeta) return;

      // Close mobile sidebar if open
      document.getElementById('appSidebar').classList.remove('open');
      document.getElementById('sidebarBackdrop').classList.remove('show');

      // Update active state in sidebar
      document.querySelectorAll('.file-item').forEach(item => {
        if (item.dataset.path === filePath) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      // Update UI displays
      document.getElementById('dashboardView').style.display = 'none';
      document.getElementById('editorView').style.display = 'flex';
      document.getElementById('activeFilePath').innerText = filePath;
      document.getElementById('activeFileSize').innerText = formatBytes(fileMeta.size);
      document.getElementById('activeFileLineCount').innerText = `${fileMeta.lines} lines`;

      // Set file icon
      const iconEl = document.getElementById('activeFileIcon');
      iconEl.className = 'fa-brands ' + getFileIcon(fileMeta.lang);

      // Reset Copy button visual state
      const copyBtn = document.getElementById('copyCodeBtn');
      copyBtn.classList.remove('copied');
      copyBtn.querySelector('span').innerText = 'Copy Code';
      copyBtn.querySelector('i').className = 'fa-solid fa-copy';

      // Load code content
      const codeBlock = document.getElementById('codeBlock');
      codeBlock.className = `language-${fileMeta.lang} line-numbers`;
      
      if (fileMeta.content) {
        codeBlock.textContent = fileMeta.content;
        Prism.highlightElement(codeBlock);
      } else {
        codeBlock.textContent = `Fetching file content...`;
        try {
          const response = await fetch(filePath);
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const content = await response.text();
          fileMeta.content = content; // cache
          codeBlock.textContent = content;
        } catch (error) {
          console.error(error);
          codeBlock.textContent = `Error loading file content.\n\nDetail: ${error.message}\n\nNote: If you opened this file directly from the file system (file:// protocol), your browser's security rules block local fetch requests. Please host this folder on a local web server (e.g., using VS Code Live Server extension, or by running "python -m http.server" in this directory) to browse the code files.`;
        }
        Prism.highlightElement(codeBlock);
      }
      
      // Reset scroll of code block to top
      document.querySelector('.code-container').scrollTop = 0;
      document.querySelector('.code-container').scrollLeft = 0;
    }

    function copyCode() {
      if (!activeFilePath) return;
      const meta = PROJECT_FILES[activeFilePath];
      const content = meta.content || document.getElementById('codeBlock').textContent;
      
      navigator.clipboard.writeText(content).then(() => {
        const copyBtn = document.getElementById('copyCodeBtn');
        copyBtn.classList.add('copied');
        copyBtn.querySelector('span').innerText = 'Copied!';
        copyBtn.querySelector('i').className = 'fa-solid fa-check';

        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('span').innerText = 'Copy Code';
          copyBtn.querySelector('i').className = 'fa-solid fa-copy';
        }, 1500);
      }).catch(err => {
        console.error('Failed to copy: ', err);
        alert('Failed to copy text. Please select manually and copy.');
      });
    }

    function downloadActiveFile() {
      if (!activeFilePath) return;
      const meta = PROJECT_FILES[activeFilePath];
      const content = meta.content || document.getElementById('codeBlock').textContent;
      
      const blob = new Blob([content], { type: meta.mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = activeFilePath.split('/').pop();
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function downloadAllAsZip() {
      const spinnerOverlay = document.getElementById('spinnerOverlay');
      const spinnerText = document.getElementById('spinnerText');
      
      spinnerOverlay.classList.add('show');
      spinnerText.innerText = 'Initializing ZIP Generator...';

      setTimeout(async () => {
        try {
          if (typeof JSZip === 'undefined') {
            throw new Error('JSZip library not loaded. Please connect to the internet.');
          }

          const zip = new JSZip();
          const filePaths = Object.keys(PROJECT_FILES);
          
          for (let i = 0; i < filePaths.length; i++) {
            const filePath = filePaths[i];
            spinnerText.innerText = `Fetching and bundling: ${filePath} (${i+1}/${filePaths.length})`;
            
            let content = PROJECT_FILES[filePath].content;
            if (!content) {
              try {
                const response = await fetch(filePath);
                if (response.ok) {
                  content = await response.text();
                  PROJECT_FILES[filePath].content = content; // cache
                } else {
                  content = `// Error fetching file: ${filePath}`;
                }
              } catch (e) {
                content = `// Error fetching file: ${filePath}\n// Detail: ${e.message}`;
              }
            }
            zip.file(filePath, content);
          }

          spinnerText.innerText = 'Compressing files into archive...';
          
          const content = await zip.generateAsync({ type: 'blob' });
          const url = URL.createObjectURL(content);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'hyperlocal-admin-portal-code-export.zip';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          spinnerOverlay.classList.remove('show');
        } catch (error) {
          console.error(error);
          alert('Failed to generate ZIP: ' + error.message);
          spinnerOverlay.classList.remove('show');
        }
      }, 100);
    }
